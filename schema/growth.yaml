# Growth Schema
# 성장의 지표. 무르익음을 어떻게 아는가.
# ---
# version: 0.0
# status: draft

growth:
  stage: ~          # 현재 단계. (씨앗/새싹/꽃/열매)
  signals: []       # 성장 신호. 무르익고 있다는 것을 어떻게 감지하는가.
  milestones: []    # 이정표. 다음 단계로 넘어가는 조건.
  pruning: ~        # 가지치기. 무엇을 놓아야 자라는가.
  propagation: ~    # 번식. 어떻게 다음 Kytos를 낳는가.
